<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact - B-Media</title>
<style>
    body {
        font-family: 'Segoe UI', sans-serif;
        background-color: #f0f2f5;
        margin: 0;
        padding: 30px;
        text-align: center;
    }
    header, footer {
        background-color: #0d6efd;
        color: white;
        padding: 15px 0;
    }
    header .logo {
        font-weight: bold;
        font-size: 24px;
    }
    nav ul {
        list-style: none;
        padding: 0;
        margin: 10px 0 0 0;
        display: flex;
        justify-content: center;
        gap: 20px;
    }
    nav ul li a {
        color: white;
        text-decoration: none;
        font-weight: 500;
    }
    h2 {
        color: #0d6efd;
        margin-bottom: 20px;
    }
    form {
        background-color: white;
        max-width: 500px;
        margin: 20px auto;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 0 15px rgba(0,0,0,0.2);
        text-align: left;
    }
    label {
        display: block;
        margin-top: 15px;
        font-weight: bold;
    }
    input, textarea {
        width: 100%;
        padding: 10px;
        margin-top: 5px;
        border-radius: 5px;
        border: 1px solid #ccc;
        font-size: 16px;
        box-sizing: border-box;
    }
    button {
        margin-top: 20px;
        padding: 10px 15px;
        font-size: 16px;
        background-color: #0d6efd;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
    }
    button:hover {
        background-color: #0056b3;
    }
    #confirmation {
        margin-top: 20px;
        font-weight: bold;
        color: green;
    }
    #error {
        margin-top: 20px;
        font-weight: bold;
        color: red;
    }
</style>
</head>
<body>

<header>
    <div class="logo">MonProjet</div>
    <nav>
        <ul>
            <li><a href="index.html">Accueil</a></li>
            <li><a href="modules.html">Actions</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>
</header>

<h2>Contactez B-Media</h2>

<form id="contactForm">
    <label for="name">Nom :</label>
    <input type="text" id="name" name="Nom" required>

    <label for="email">Email :</label>
    <input type="email" id="email" name="Email" required>

    <label for="subject">Sujet :</label>
    <input type="text" id="subject" name="Sujet" required>

    <label for="message">Message :</label>
    <textarea id="message" name="Message" rows="6" required></textarea>

    <button type="submit">Envoyer</button>
</form>

<div id="confirmation"></div>
<div id="error"></div>

<script>
const form = document.getElementById('contactForm');
const confirmation = document.getElementById('confirmation');
const error = document.getElementById('error');

form.addEventListener('submit', function(e) {
    e.preventDefault(); // Empêche l'envoi normal

    // Validation simple
    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const subject = document.getElementById('subject').value.trim();
    const message = document.getElementById('message').value.trim();

    if (!name || !email || !subject || !message) {
        error.textContent = "⚠️ Tous les champs sont obligatoires !";
        confirmation.textContent = "";
        return;
    }

    // Confirmation à l'utilisateur
    confirmation.textContent = `✅ Merci ${name}, votre message a été envoyé !`;
    error.textContent = "";

    // Préparer mailto (ouvre le client mail)
    const mailtoLink = `mailto:bmedia@gmail.com?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent("Nom: " + name + "\nEmail: " + email + "\n\nMessage:\n" + message)}`;
    window.location.href = mailtoLink;

    form.reset();
});
</script>

<footer>
    <p>© 2026 Projet Examen - Tous droits réservés</p>
</footer>

</body>
</html>
